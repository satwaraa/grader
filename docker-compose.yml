services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lpu-network

  redis:
    image: redis:7-alpine
    container_name: assignment-grader-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lpu-network
  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.api
    container_name: assignment-grader-api
    restart: unless-stopped
    ports:
      - "8600:8600"
    environment:
      NODE_ENV: production
      PORT: 8600
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      ACCESSKEYID: ${ACCESSKEYID}
      SECRETACCESSKEY: ${SECRETACCESSKEY}
      BUCKET_NAME: ${BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT}
    depends_on:
      - redis
      - postgres
    networks:
      - lpu-network
    command: ["bun", "dist/index.js"]

  ws:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.api
    container_name: assignment-grader-ws
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: production
      PORT: 9000
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - lpu-network
    command: ["bun", "dist/ws/index.js"]

  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.workers
    container_name: assignment-grader-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ACCESSKEYID: ${ACCESSKEYID}
      SECRETACCESSKEY: ${SECRETACCESSKEY}
      BUCKET_NAME: ${BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT}
      PUBLIC_ENDPOINT: ${PUBLIC_ENDPOINT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      - redis
      - postgres
    networks:
      - lpu-network
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: assignment-grader-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8600/api
    depends_on:
      - api
    networks:
      - lpu-network

volumes:
  redis_data:
  postgres_data:

networks:
  lpu-network:
    driver: bridge
