services:
  redis:
    image: redis:7-alpine
    container_name: assignment-grader-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: "always"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  # Backend API
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: assignment-grader-backend
    restart: unless-stopped
    ports:
      - "8600:8600"
    environment:
      NODE_ENV: production
      PORT: 8600
      DATABASE_URL: ${DATABASE_URL}
    networks:
      - lpu-network
    volumes:
      - ./apps/backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8600/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend App
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8600/api
    container_name: assignment-grader-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - lpu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  redis_data:
networks:
  lpu-network:
    driver: bridge
