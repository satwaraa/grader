{{- if .Values.tags.worker }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "assignment-grader.fullname" . }}-worker
  labels:
    {{- include "assignment-grader.worker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "assignment-grader.worker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "assignment-grader.worker.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "assignment-grader.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: worker
          image: "{{ .Values.global.imageRegistry }}{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "assignment-grader.configMapName" . }}
            - secretRef:
                name: {{ include "assignment-grader.secretName" . }}
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: DATABASE_URL
              value: {{ include "assignment-grader.databaseUrl" . | quote }}
            - name: REDIS_URL
              value: {{ include "assignment-grader.redisUrl" . | quote }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
