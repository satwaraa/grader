{{- if .Values.tags.frontend }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "assignment-grader.fullname" . }}-frontend
  labels:
    {{- include "assignment-grader.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "assignment-grader.frontend.selectorLabels" . | nindent 4 }}
{{- end }}
