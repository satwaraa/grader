{{- if .Values.tags.api }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "assignment-grader.fullname" . }}-api
  labels:
    {{- include "assignment-grader.api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "assignment-grader.api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "assignment-grader.api.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "assignment-grader.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8600
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "assignment-grader.configMapName" . }}
            - secretRef:
                name: {{ include "assignment-grader.secretName" . }}
          env:
            - name: PORT
              value: "8600"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: DATABASE_URL
              value: {{ include "assignment-grader.databaseUrl" . | quote }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
